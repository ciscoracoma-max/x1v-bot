services:
  - type: worker
    name: v1xclusive-vouch-bot
    runtime: python
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: python v1x.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TOKEN
        sync: false
